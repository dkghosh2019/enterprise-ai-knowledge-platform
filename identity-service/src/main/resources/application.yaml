server:
  port: 9000

spring:
  application:
    name: identity-service
  security:
    oauth2:
      authorizationserver:
        issuer: ${IDENTITY_ISSUER:http://localhost:9000}
        client:
          platform-client:
            registration:
              client-id: platform-client
              client-secret: "${PLATFORM_CLIENT_SECRET:{noop}platform-secret}"
              client-authentication-methods:
                - client_secret_basic
              authorization-grant-types:
                - client_credentials
              scopes:
                - knowledge.read
            token:
              access-token-time-to-live: 15m

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
