
spring:
  application:
    name: knowledge-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_ISSUER:http://localhost:9000}
          jwk-set-uri: ${IDENTITY_JWK_SET_URI:http://localhost:9000/oauth2/jwks}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

info:
  app:
    name: Knowledge Service
    description: Enterprise AI document and knowledge management service
